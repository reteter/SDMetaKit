# Publikuje SDMetaKit.Core i SDMetaKit.Cli na nuget.org przez Trusted Publishing (OIDC).
#
# Jednorazowa konfiguracja na https://www.nuget.org → Trusted Publishing:
#   Package owner (nuget.org username): arkoniel
#   Repository Owner: reteter
#   Repository:       SDMetaKit
#   Workflow File:    publish-nuget.yml
#
# Uruchomienie: push tagu v* (np. v1.0.0) lub workflow_dispatch.
#
# Podpisywanie pakietów (wymagane gdy na nuget.org masz zarejestrowany certyfikat):
#   GitHub → Settings → Secrets → Actions:
#     NUGET_SIGN_CERT_BASE64  — plik .pfx zakodowany base64
#     NUGET_SIGN_CERT_PASSWORD — hasło do .pfx
#   Certyfikat .cer (publiczny) musi być zarejestrowany na nuget.org → Certificates.
#
# Alternatywa bez podpisywania: usuń wszystkie certyfikaty z nuget.org → Account settings → Certificates.

name: Publish NuGet

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Set package version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/SDMetaKit.Core/SDMetaKit.Core.csproj | head -1)
            echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          fi

      - name: Test
        run: dotnet test SDMetaKit.slnx -c Release --verbosity normal

      - name: Pack Core
        run: dotnet pack src/SDMetaKit.Core/SDMetaKit.Core.csproj -c Release -p:Version="$PACKAGE_VERSION" -o artifacts

      - name: Pack CLI
        run: |
          CLI_VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/SDMetaKit.Cli/SDMetaKit.Cli.csproj | head -1)
          dotnet pack src/SDMetaKit.Cli/SDMetaKit.Cli.csproj -c Release -p:Version="$CLI_VERSION" -o artifacts

      - name: Sign package
        env:
          NUGET_SIGN_CERT_BASE64: ${{ secrets.NUGET_SIGN_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.NUGET_SIGN_CERT_PASSWORD }}
        run: |
          if [ -z "$NUGET_SIGN_CERT_BASE64" ]; then
            echo "Signing skipped — NUGET_SIGN_CERT_BASE64 not configured"
            exit 0
          fi
          echo "$NUGET_SIGN_CERT_BASE64" | base64 -d > /tmp/sign-cert.pfx
          dotnet nuget sign artifacts/*.nupkg \
            --certificate-path /tmp/sign-cert.pfx \
            --certificate-password "$CERT_PASSWORD" \
            --timestamper http://timestamp.digicert.com \
            --overwrite
          rm -f /tmp/sign-cert.pfx

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: arkoniel

      - name: Push to nuget.org
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate