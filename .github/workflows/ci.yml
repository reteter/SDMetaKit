name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SDMetaKit.slnx

      - name: Build
        run: dotnet build SDMetaKit.slnx -c Release --no-restore

      - name: Test
        run: dotnet test SDMetaKit.slnx -c Release --no-build --verbosity normal